services:
  db:
    image: mysql:8.0
    container_name: spain-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - ./spain.sql:/docker-entrypoint-initdb.d/spain.sql
      - spain-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -p${DB_PASSWORD:-root} -e 'SELECT 1 FROM spain.ccaa LIMIT 1' 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  api:
    build: ./BACKEND
    container_name: spain-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/spain?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
    depends_on:
      db:
        condition: service_healthy

volumes:
  spain-data:
